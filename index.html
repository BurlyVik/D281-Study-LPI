<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linux Quiz</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #f6f7fb;
  color: #111;
}

/* ===== LAYOUT GRID (UPDATED) ===== */
.container {
  display: grid;
  grid-template-columns: 2fr 1fr; /* middle + right only */
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  gap: 10px;
  padding: 20px;
  box-sizing: border-box;
}

/* TOP */
.top {
  grid-column: 1 / 3;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  padding: 10px;
}

/* RIGHT PANEL */
.right {
  background: #fff;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  font-size: 14px;
}

/* CENTER (QUIZ) */
.middle {
  background: #fff;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* QUESTION */
.question {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
}

/* OPTIONS */
.option {
  display: block;
  margin: 10px 0;
  padding: 8px;
  border-radius: 6px;
  font-size: 16px;
}

/* BUTTONS */
button {
  margin-top: 12px;
  margin-right: 8px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #2d6cdf;
  color: white;
  font-weight: 500;
}

button:hover {
  background: #1f54b8;
}

#result {
  margin-top: 15px;
  font-weight: 600;
}

/* BOTTOM */
.bottom {
  grid-column: 1 / 3;
  text-align: center;
  font-size: 13px;
  color: #666;
}

/* HIGHLIGHTS */
.correct {
  background: #d4f8d4;
  border: 1px solid #2ecc71;
}

.wrong {
  background: #ffd6d6;
  border: 1px solid #e74c3c;
}

.button-row {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="top">Linux Quiz Challenge</div>

  <!-- CENTER -->
  <div class="middle">
    <div id="question" class="question"></div>
    <div id="options"></div>

    <div id="result"></div>

    <div class="button-row">
      <button onclick="submitAnswer()">Submit</button>
      <button onclick="nextQuestion()">Next</button>
      <button onclick="toggleFlag()">Flag</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h4>Flagged</h4>
    <ul id="flaggedList"></ul>
  </div>

  <div class="bottom">Answer carefully — questions are randomized</div>

</div>

<script>
let questions = [];
let currentIndex = 0;
let selectedAnswer = [];
let flagged = [];

/* ===== LOAD JSON ===== */
fetch("qa.json")
  .then(r => r.json())
  .then(data => {
    questions = shuffle([...data]);
    loadQuestion();
  });

/* ===== SHUFFLE ===== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ===== LOAD QUESTION ===== */
function loadQuestion() {
  const q = questions[currentIndex];
  selectedAnswer = [];

  document.getElementById("result").innerText = "";

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  const isMulti = q.answer.length > 1;

  q.options.forEach(opt => {
    const label = document.createElement("label");
    label.className = "option";
    label.id = "opt-" + opt;

    const input = document.createElement("input");
    input.type = isMulti ? "checkbox" : "radio";
    input.name = "opt";
    input.value = opt;

    input.onchange = () => {
      if (isMulti) {
        if (input.checked) selectedAnswer.push(opt);
        else selectedAnswer = selectedAnswer.filter(x => x !== opt);
      } else {
        selectedAnswer = [opt];
      }
    };

    label.appendChild(input);
    label.appendChild(document.createTextNode(" " + opt));

    optionsDiv.appendChild(label);
  });
}

/* ===== SUBMIT ===== */
function submitAnswer() {
  const q = questions[currentIndex];
  const correctSet = new Set(q.answer);

  let isCorrect =
    selectedAnswer.length === q.answer.length &&
    selectedAnswer.every(x => correctSet.has(x));

  // reset styles
  q.options.forEach(opt => {
    const el = document.getElementById("opt-" + opt);
    el.classList.remove("correct", "wrong");
  });

  // wrong selected
  selectedAnswer.forEach(opt => {
    if (!correctSet.has(opt)) {
      document.getElementById("opt-" + opt).classList.add("wrong");
    }
  });

  // correct answers always green
  q.answer.forEach(opt => {
    document.getElementById("opt-" + opt).classList.add("correct");
  });

  document.getElementById("result").innerText =
    isCorrect ? "Correct ✅" : "Wrong ❌";
}

/* ===== NEXT ===== */
function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    loadQuestion();
  } else {
    document.querySelector(".middle").innerHTML =
      "<h2>Quiz Complete 🎉</h2>";
  }
}

/* ===== FLAG ===== */
function toggleFlag() {
  const q = questions[currentIndex];

  const exists = flagged.find(f => f.id === q.id);

  if (exists) {
    flagged = flagged.filter(f => f.id !== q.id);
  } else {
    flagged.push({ id: q.id, text: q.question });
  }

  renderFlags();
}

function renderFlags() {
  const list = document.getElementById("flaggedList");
  list.innerHTML = "";

  flagged.forEach(item => {
    const li = document.createElement("li");
    li.innerText = item.text;
    li.style.cursor = "pointer";

    li.onclick = () => {
      const index = questions.findIndex(q => q.id === item.id);
      if (index === -1) return;

      currentIndex = index;
      loadQuestion();
      document.getElementById("result").innerText = "";
    };

    list.appendChild(li);
  });
}
</script>

</body>
</html>
