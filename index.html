<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linux Quiz</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #f6f7fb;
  color: #111;
}

/* ===== LAYOUT GRID ===== */
.container {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  gap: 10px;
  padding: 20px;
  box-sizing: border-box;
}

/* TOP */
.top {
  grid-column: 1 / 4;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  padding: 10px;
}

/* LEFT / RIGHT PANELS */
.left, .right {
  background: #fff;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  font-size: 14px;
}

/* CENTER (MAIN QUIZ) */
.middle {
  background: #fff;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* QUESTION */
.question {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
}

/* OPTIONS */
.option {
  display: block;
  margin: 10px 0;
  font-size: 16px;
}

/* BUTTONS */
button {
  margin-top: 12px;
  margin-right: 8px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #2d6cdf;
  color: white;
  font-weight: 500;
}

button:hover {
  background: #1f54b8;
}

#result {
  margin-top: 15px;
  font-weight: 600;
}

/* BOTTOM */
.bottom {
  grid-column: 1 / 4;
  text-align: center;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

  <div class="top">Linux Quiz Challenge</div>

  <div class="left">
    <h4>Navigation</h4>
    <button onclick="nextQuestion()">Next</button>
    <button onclick="submitAnswer()">Submit</button>
    <button onclick="toggleFlag()">Flag</button>
  </div>

  <div class="middle">
    <div id="question" class="question"></div>
    <div id="options"></div>
    <div id="result"></div>
  </div>

  <div class="right">
    <h4>Flagged</h4>
    <ul id="flaggedList"></ul>
  </div>

  <div class="bottom">Answer carefully — questions are randomized</div>

</div>

<script>
let questions = [];
let currentIndex = 0;
let selectedAnswer = [];
let flagged = new Set();

/* ===== LOAD JSON ===== */
fetch("qa.json")
  .then(r => r.json())
  .then(data => {
    questions = shuffle([...data]);   // 🔥 RANDOMIZE
    loadQuestion();
  });

/* ===== SHUFFLE ===== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ===== LOAD QUESTION ===== */
function loadQuestion() {
  const q = questions[currentIndex];
  selectedAnswer = [];

  document.getElementById("result").innerText = "";

  document.getElementById("question").innerText =
    `Q${q.id}: ${q.question}`;

  const isMulti = q.answer.length > 1;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt => {
    const label = document.createElement("label");
    label.className = "option";

    const input = document.createElement("input");
    input.type = isMulti ? "checkbox" : "radio";

    input.name = "opt";
    input.value = opt;

    input.onchange = () => {
      if (isMulti) {
        if (input.checked) selectedAnswer.push(opt);
        else selectedAnswer = selectedAnswer.filter(x => x !== opt);
      } else {
        selectedAnswer = [opt];
      }
    };

    label.appendChild(input);
    label.appendChild(document.createTextNode(" " + opt));
    optionsDiv.appendChild(label);
  });
}

/* ===== SUBMIT ===== */
function submitAnswer() {
  const q = questions[currentIndex];

  const correct = [...q.answer].sort().join(",");
  const user = [...selectedAnswer].sort().join(",");

  const ok = correct === user;

  document.getElementById("result").innerText =
    ok ? "Correct ✅" : "Wrong ❌";
}

/* ===== NEXT ===== */
function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    loadQuestion();
  } else {
    document.querySelector(".middle").innerHTML =
      "<h2>Quiz Complete 🎉</h2>";
  }
}

/* ===== FLAG ===== */
function toggleFlag() {
  const id = questions[currentIndex].id;

  flagged.has(id) ? flagged.delete(id) : flagged.add(id);
  renderFlags();
}

function renderFlags() {
  const list = document.getElementById("flaggedList");
  list.innerHTML = "";

  flagged.forEach(id => {
    const li = document.createElement("li");
    li.innerText = "Question ID: " + id;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
