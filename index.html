<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Linux Quiz</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #f6f7fb;
  color: #111;
}

/* ===== GRID ===== */
.container {
  display: grid;
  grid-template-columns: 2fr 1fr;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
  gap: 10px;
  padding: 20px;
  box-sizing: border-box;
}

/* TOP */
.top {
  grid-column: 1 / 3;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  padding: 10px;
}

/* QUIZ */
.middle {
  background: #fff;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.question {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
}

.option {
  display: block;
  margin: 10px 0;
  padding: 8px;
  border-radius: 6px;
  font-size: 16px;
}

#result {
  margin-top: 15px;
  font-weight: 600;
}

/* BUTTONS */
button {
  margin-top: 12px;
  margin-right: 8px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #2d6cdf;
  color: white;
  font-weight: 500;
}

button:hover {
  background: #1f54b8;
}

.button-row {
  margin-top: 15px;
}

/* RIGHT PANEL */
.right {
  background: #fff;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  font-size: 14px;
}

/* LINKS */
.link {
  display: block;
  margin: 6px 0;
  cursor: pointer;
  text-decoration: underline;
  color: #2d6cdf;
}

.link:hover {
  color: #1f54b8;
}

/* HIGHLIGHTING */
.correct {
  background: #d4f8d4;
  border: 1px solid #2ecc71;
}

.wrong {
  background: #ffd6d6;
  border: 1px solid #e74c3c;
}

/* BOTTOM */
.bottom {
  grid-column: 1 / 3;
  text-align: center;
  font-size: 13px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">

  <div class="top">Linux Quiz Challenge</div>

  <!-- QUIZ AREA -->
  <div class="middle">
    <div id="question" class="question"></div>
    <div id="options"></div>

    <div id="result"></div>

    <div class="button-row">
      <button onclick="submitAnswer()">Submit</button>
      <button onclick="nextQuestion()">Next</button>
      <button onclick="toggleFlag()">Flag</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <h4>Wrong</h4>
    <div id="wrongList"></div>

    <hr>

    <h4>Right</h4>
    <div id="rightList"></div>
  </div>

  <div class="bottom">Answer carefully — questions are randomized</div>

</div>

<script>
let questions = [];
let currentIndex = 0;
let selectedAnswer = [];
let wrong = [];
let right = [];

/* ===== LOAD JSON ===== */
fetch("qa.json")
  .then(r => r.json())
  .then(data => {
    questions = shuffle([...data]);
    loadQuestion();
  });

/* ===== SHUFFLE ===== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ===== LOAD QUESTION ===== */
function loadQuestion() {
  document.getElementById("question").innerText = q.question;
  const q = questions[currentIndex];
  selectedAnswer = [];

  document.getElementById("result").innerText = "";

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  const isMulti = q.answer.length > 1;

  q.options.forEach(opt => {
    const label = document.createElement("label");
    label.className = "option";
    label.id = "opt-" + opt;

    const input = document.createElement("input");
    input.type = isMulti ? "checkbox" : "radio";
    input.name = "opt";
    input.value = opt;

    input.onchange = () => {
      if (isMulti) {
        if (input.checked) selectedAnswer.push(opt);
        else selectedAnswer = selectedAnswer.filter(x => x !== opt);
      } else {
        selectedAnswer = [opt];
      }
    };

    label.appendChild(input);
    label.appendChild(document.createTextNode(" " + opt));

    optionsDiv.appendChild(label);
  });
}

/* ===== SUBMIT ===== */
function submitAnswer() {
  const q = questions[currentIndex];
  const correctSet = new Set(q.answer);

  const isCorrect =
    selectedAnswer.length === q.answer.length &&
    selectedAnswer.every(x => correctSet.has(x));

  // reset styles
  q.options.forEach(opt => {
    const el = document.getElementById("opt-" + opt);
    el.classList.remove("correct", "wrong");
  });

  // wrong selections
  selectedAnswer.forEach(opt => {
    if (!correctSet.has(opt)) {
      document.getElementById("opt-" + opt).classList.add("wrong");
    }
  });

  // correct answers always green
  q.answer.forEach(opt => {
    document.getElementById("opt-" + opt).classList.add("correct");
  });

  document.getElementById("result").innerText =
    isCorrect ? "Correct ✅" : "Wrong ❌";

  updateTracking(q, isCorrect);
}

/* ===== TRACK RESULTS ===== */
function updateTracking(q, isCorrect) {
  removeFromLists(q.id);

  if (isCorrect) {
    right.push(q);
  } else {
    wrong.push(q);
  }

  renderLists();
}

function removeFromLists(id) {
  wrong = wrong.filter(q => q.id !== id);
  right = right.filter(q => q.id !== id);
}

/* ===== RENDER RIGHT/WRONG ===== */
function renderLists() {
  const wrongList = document.getElementById("wrongList");
  const rightList = document.getElementById("rightList");

  wrongList.innerHTML = "";
  rightList.innerHTML = "";

  wrong.forEach(q => {
    const div = document.createElement("div");
    div.className = "link";
    div.innerText = q.question;

    div.onclick = () => goToQuestion(q.id);

    wrongList.appendChild(div);
  });

  right.forEach(q => {
    const div = document.createElement("div");
    div.className = "link";
    div.innerText = q.question;

    div.onclick = () => goToQuestion(q.id);

    rightList.appendChild(div);
  });
}

/* ===== NAVIGATE RESET ===== */
function goToQuestion(id) {
  const index = questions.findIndex(q => q.id === id);
  if (index === -1) return;

  currentIndex = index;
  selectedAnswer = [];

  loadQuestion();
  document.getElementById("result").innerText = "";
}

/* ===== NEXT ===== */
function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    loadQuestion();
  } else {
    document.querySelector(".middle").innerHTML =
      "<h2>Quiz Complete 🎉</h2>";
  }
}

/* ===== FLAG BUTTON (optional placeholder) ===== */
function toggleFlag() {
  alert("Optional feature removed in this version");
}
</script>

</body>
</html>
